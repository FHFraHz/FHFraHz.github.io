<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            height: 100svh;
            perspective: 200px;
            /*  */
        }
        h1, h2, h3, h4, h5, h6 { margin: 0; padding: 1ch 0ch;}

        .scene {
            perspective: 150em;
            perspective-origin: 50% calc(50% - 10em);
            transform-style: preserve-3d;
            background: #1117;
            width: 100%; height: 100%;
            font-size: 12px;
            overflow: hidden;
            /* transform: rotateX(20deg); */
            --house-height: 10em;
            --house-width: calc(var(--house-height) * 0.75);
            position: relative;
            transform: rotateX(-10deg) rotateY(-10deg);

            .house {

                transform-style: preserve-3d;
                position: absolute;
                /* --house-height: 500px;
                --house-width: 375px; */
                height: var(--house-height);
                width: var(--house-height);
                top: calc(50% - calc(var(--house-height) / 2));
                left: calc(50% - calc(var(--house-height) / 2));
                /* transform: translate(50%, 50%); */
                
                .house-side {
                    position: absolute;
                    /* opacity: 50%; */
                    /* background: whitesmoke; */
                }
                .house-side.left, .house-side.right {
                    top: 50%;
                    height: 50%;
                    width: var(--house-height);
                }
                .house-side.front, .house-side.back {
                    top: 0%;
                    width: var(--house-width);
                    clip-path: polygon(0% 50%, 50% 0%, 100% 50%, 100% 100%, 0% 100%, 0% 50%);
                    height: 100%;
                }
                .house-side.front {
                    background-color: whitesmoke;
                    background-image: radial-gradient(ellipse at top left, #FFF0, #FB03);
                    transform: translateZ(calc(var(--house-height) / 2));
                }
                .house-side.back {
                    background: slategray;
                    transform: translateZ(calc(0px - calc(var(--house-height) / 2)));
                }
                .house-side.right {
                    background: green;
                    transform:
                        translateX(calc(var(--house-width) * 0.33))
                        rotateY(90deg)
                        ;
                }
                .house-side.left {
                    background: magenta;
                    transform:
                        translateX(calc(var(--house-width) * -0.66))
                        rotateY(270deg)
                        ;
                }
                .roof-side.left, .roof-side.right {
                    height: 80%;
                    width: 100%;
                    position: absolute;
                    outline: 1px solid limegreen;
                }

                .roof-side.left {
                    background: firebrick;
                    transform:
                        translateY(-10%)
                        translateX(-37%)
                        rotateZ(37deg)
                        rotateY(90deg);
                }
                .roof-side.right {
                    background: orange;
                    transform:
                        translateY(-10%)
                        translateX(12%)
                        rotateZ(323deg)
                        rotateY(270deg);
                }

            }

            .grass {
                position: absolute;
                width: 200%;
                height: 200%;
                
                background: #0707;
                position: absolute;
                transform-style: preserve-3d;
                /* top: calc(50% - calc(var(--house-height) / 2)); */
                /* left: calc(50% - calc(var(--house-height) / 2)); */
                transform: rotateX(90deg) translate(-25%, -175%);
            }

        }

    </style>
    
    <div class="scene">
        <div class="house">
            <div class="house-side front"></div>
            <div class="house-side left"></div>
            <div class="house-side right"></div>
            <div class="house-side back"></div>
            <div class="roof-side left"></div>
            <div class="roof-side right"></div>            
        </div>
        <div class="grass"></div>
    </div>
</body>
</html>
