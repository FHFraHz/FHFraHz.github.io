            <div class="grass"></div>

                    </div>

                </div>

                    <div class="windows">

                    </div>
                </div>
                <div class="house-side right">

                        <div class="window square left"></div>
                        <div class="window square right"></div>
                    </div>
                </div>
                <div class="house-side back"></div>
                <div class="house-side bottom"></div>
                <div class="roof-side left"></div>
                <div class="roof-side right"></div>            
            </div>
