<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            height: 100svh;
        }
        h1, h2, h3, h4, h5, h6 { margin: 0; padding: 1ch 0ch;}

        .house-container {
            background: #1117;
            width: 100%; height: 100%;
            perspective: 2000px;
        }
        .house {
            transform-style: preserve-3d;
            position: relative;
            --house-height: 500px;
            --house-width: 375px;
            height: var(--house-height);
            width: var(--house-height);
            transform: translateX(37vw) translateY(25vh)
            rotateY(45deg) rotateZ(350deg)
            ;
        }
        .house-side {
            position: absolute;
            opacity: 50%;
            /* background: whitesmoke; */
        }
        .house-side.left, .house-side.right {
            top: 50%;
            height: 50%;
            width: var(--house-height);
        }
        .house-side.front, .house-side.back {
            top: 0%;
            width: var(--house-width);
            clip-path: polygon(0% 50%, 50% 0%, 100% 50%, 100% 100%, 0% 100%, 0% 50%);
            height: 100%;
        }
        .house-side.front {
            background-color: whitesmoke;
            background-image: radial-gradient(to center, #FB03 #FFF0);
            transform: translateZ(calc(var(--house-height) / 2));
        }
        .house-side.back {
            background: slategray;
            transform: translateZ(calc(0px - calc(var(--house-height) / 2)));
        }
        .house-side.right {
            background: green;
            transform:
                translateX(calc(var(--house-width) * 0.33))
                rotateY(90deg)
                ;
        }
        .house-side.left {
            background: magenta;
            transform:
                translateX(calc(var(--house-width) * -0.66))
                rotateY(270deg)
                ;
        }
        .roof-side.left, .roof-side.right {
            height: 80%;
            width: 100%;
            position: absolute;
            outline: 1px solid limegreen;
        }
        .roof-side.left {
            background: firebrick;
            transform:
                translateY(-40px)
                translateX(-182px)
                rotateZ(37deg)
                rotateY(90deg);
        }
        .roof-side.right {
            background: orange;
            transform:
                translateY(-40px)
                translateX(60px)
                rotateZ(323deg)
                rotateY(270deg);
        }

    </style>
    
    <div class="house-container">
        <div class="house">
            <div class="house-side front"></div>
            <div class="house-side left"></div>
            <div class="house-side right"></div>
            <div class="house-side back"></div>
            <div class="roof-side left"></div>
            <div class="roof-side right"></div>            
        </div>
    </div>
</body>
</html>
