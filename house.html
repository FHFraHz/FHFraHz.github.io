<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            height: 100svh;
        }
        h1, h2, h3, h4, h5, h6 { margin: 0; padding: 1ch 0ch;}

        .house-container {
            background: #1117;
            width: 100%; height: 100%;
            perspective: 1000px;
        }
        .house {
            transform-style: preserve-3d;
            position: relative;
            --house-height: 500px;
            --house-width: 375px;
            height: var(--house-height);
            width: var(--house-width);
            /* transform: translateX(50%) translateY(50%) */
            /* rotateY(45deg) rotateZ(350deg) */
            ;
        }
        .house-side {
            position: absolute;
            top: 50%;
            height: 50%;
            opacity: 50%;
            /* background: whitesmoke; */
        }
        .house-side.left, .house-side.right {
            width: var(--house-height);
        }
        .house-side.front, .house-side.back {
            width: var(--house-width);
        }
        .house-side.front {
            background: whitesmoke;
            transform: translateZ(calc(var(--house-height) / 2));
            height: 100%;
            top: 0%;
            left: calc(var(--house-height) - var(--house-width));
        }
        .house-side.back {
            background: slategray;
            transform: translateZ(calc(0px - calc(var(--house-height) / 2)));
            right: calc(var(--house-height) - var(--house-width));
        }
        .house-side.right {
            background: green;
            transform: translateX(calc(var(--house-width) / 2)) rotateY(90deg);
        }
        .house-side.left {
            background: magenta;
            transform: translateX(0px) rotateY(270deg);
        }
        .roof {
            position: absolute;
            transform-style: preserve-3d;
            top: 0%;
            height: 40%;

            .roof-side {
                position: absolute;
                top: 0%;
                height: 100%;
                width: 100%;
            }
            .roof-side.right {
                    background: firebrick;
                    transform: rotateY(90deg) rotateX(25deg);
                    /* transform: rotateZ(45deg); */
            }
            .roof-side.left {
                    /* background: coral; */
                    /* transform: rotateZ:;(315deg,); */
            }
        }

    </style>
    
    <div class="house-container">
        <div class="house">
            <div class="house-side front"></div>
            <div class="house-side left"></div>
            <div class="house-side right"></div>
            <div class="house-side back"></div>
            <div class="roof">
                <div class="roof-side left"></div>
                <div class="roof-side right"></div>            
            </div>
        </div>
    </div>
</body>
</html>
