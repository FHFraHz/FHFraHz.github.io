<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <link rel="stylesheet" href="css/pages/web/css-gallery/house.css"> -->
    <title>House: 2nd Version</title>
</head>
<body>
    <style>
    body {
        /* standard viewport width and height */
        width: 100vw;
        height: 100vh;
        /* try small viewport width and height if available */
        width: 100svw;
        height: 100svh;
        /* discard default margin and padding */
        margin: 0;
        padding: 0;
    }

    .scene {
        position: relative;
        display: flex;
        width: 100%;
        height: 100%;
        background: #7777;
        font-size: 96px;
        perspective: 10em;
        perspective-origin: center;
        transform-style: preserve-3d;
        --grass-width: 5em;
        --grass-height: 5em;
        --house-width: 1em;
        --house-height: 3em;
        --house-depth: 2em;
    }

    .scene * {
        position: absolute;
        transform: rotateY(0deg);
    }

    .grass {
        top: 1em;
        width: var(--grass-width);
        height: var(--grass-height);
        transform:
            /* translateX(calc(50% - calc(var(--grass-width) / 2))) translateY(calc(50% - calc(var(--grass-height) / 2))) */
            translateX(calc(50vw - calc(var(--grass-width) / 2))) translateY(calc(50vh - calc(var(--grass-height) / 2)))
            /* translate(50%, 50%) */
            rotateX(90deg)
            ;
        /* transform: translate(50%, 50%); */
        background-image: repeating-conic-gradient(
            from 45deg,
            #1717 0deg 90deg,
            #1a17 9deg 180deg
        );
        background-size: 1em 1em;
    }

    .house * {
        position: absolute;
    }

    .house {
        width: min(calc(var(--house-height) * 1.5), 100vw);
        height: min(calc(var(--house-height) * 1.5), 100vh);
        width: inherit;
        height: inherit;
        position: relative;
        background: #7777;
        transform-style: preserve-3d;
        perspective: inherit;
        transform: rotateY(45deg);

        bottom: 50%;
        
        .house-side.front, .house-side.back {
            width: var(--house-width);
            height: var(--house-height);
            left: calc(50% - calc(var(--house-width) / 2));
        }
        .house-side.left, .house-side.right {
            width: var(--house-height);
            height: calc(var(--house-height) / 2);
        }
        .house-side.front {
            background: #7117;
            transform:
                translateZ(calc(var(--house-depth) * 0.5));
            ;
        }
        .house-side.back {
            background: #1177;
            transform:
                translateZ(calc(var(--house-depth) * -0.5))
                rotateY(180deg);
            ;
        }
    }

    </style>
    <div class="scene">
        <div class="grass"></div>
        <div class="house">
            <div class="house-side front"></div>
            <div class="house-side left"></div>
            <div class="house-side right"></div>
            <div class="house-side back"></div>
            <div class="roof-side left"></div>
            <div class="roof-side right"></div>            
        </div>
        <!--
        <div class="tree">
            <div class="tree-side-8th" style="--tree-side-i: 1"></div>
            <div class="tree-side-8th" style="--tree-side-i: 2"></div>
            <div class="tree-side-8th" style="--tree-side-i: 3"></div>
            <div class="tree-side-8th" style="--tree-side-i: 4"></div>
            <div class="tree-side-8th" style="--tree-side-i: 5"></div>
            <div class="tree-side-8th" style="--tree-side-i: 6"></div>
            <div class="tree-side-8th" style="--tree-side-i: 7"></div>
            <div class="tree-side-8th" style="--tree-side-i: 8"></div>
            <div class="trunk"></div>
        </div>
        -->
    </div>
</body>
</html>
