<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <link rel="stylesheet" href="css/pages/web/css-gallery/house.css"> -->
    <title>House: 2nd Version</title>
</head>
<body>
    <style>
    body {
        /* standard viewport width and height */
        width: 100vw;
        height: 100vh;
        /* try small viewport width and height if available */
        width: 100svw;
        height: 100svh;
        /* discard default margin and padding */
        margin: 0;
        padding: 0;
    }

    .container {
        width: 100%;
        height: 100%;
        position: relative;
        perspective: 100em;
        perspective-origin: center;
        overflow: hidden;
    }

    .scene {
        position: relative;
        /* display: flex; */
        width: 100%;
        height: 100%;
        /* background: #7777; */
        font-size: 96px;
        transform-style: preserve-3d;
        --grass-width: 7em;
        --grass-height: 7em;
        --house-width: 1.5em;
        --house-height: 2em;
        --house-depth: 1em;
        animation: speen 8s infinite linear;
    }

    .scene > * {
        position: absolute;
        /* transform: rotateY(45deg); */
    }

    @keyframes speen {
        0% {
            transform: rotateY(0deg);
        }
        100% {
            transform: rotateY(360deg);
        }
    }

    .grass {
        top: 1em;
        width: var(--grass-width);
        height: var(--grass-height);
        transform:
            /* translateX(calc(50% - calc(var(--grass-width) / 2))) translateY(calc(50% - calc(var(--grass-height) / 2))) */
            translateX(calc(50vw - var(--grass-width) / 2)) translateY(calc(50vh - var(--grass-height) / 2))
            rotateX(90deg)
            /* translate(50%, 50%) */
            ;
        /* transform: translate(50%, 50%); */
        background-image: repeating-conic-gradient(
            from 45deg,
            #1717 0deg 90deg,
            #1a17 9deg 180deg
        );
        background-size: 1em 1em;
    }

    .house * {
        position: absolute;
    }

    .house {
        --house-container-margin: 1em;
        --house-container-width: calc(var(--house-height) + var(--house-container-margin));
        --house-container-height: calc(var(--house-height) + var(--house-container-margin));
        width: var(--house-container-width);
        height: var(--house-container-height);
        top: calc(50% - var(--house-container-height) / 2 - var(--house-container-margin) * 0.5);
        left: calc(50% - var(--house-container-width) / 2);
        position: relative;
        /* background: #7777; */
        transform-style: preserve-3d;
        /* perspective: inherit; */
        /* transform: rotateY(45deg); */
        
        .house-side {
            bottom: 0;
            left: calc(var(--house-container-margin) / 2);
            width: var(--house-height);
            height: var(--house-height);
            /* background: #faa7; */
            outline: 1px solid lime;
        }
        .house-side.front {
            transform: translateZ(calc(var(--house-height) * 0.5));
        }
        .house-side.back {
            transform: translateZ(calc(var(--house-height) * -0.5));
        }
        .house-side.left {
            transform: translateX(calc(var(--house-width) * -2/3)) rotateY(90deg);
        }
        .house-side.right {
            transform: translateX(calc(var(--house-width) * 2/3)) rotateY(90deg);
        }
    }

    </style>
    <div class="container">
        <div class="scene">
            <div class="grass"></div>
            <div class="house">
                <div class="house-side front"></div>
                <div class="house-side left"></div>
                <div class="house-side right"></div>
                <div class="house-side back"></div>
                <div class="roof-side left"></div>
                <div class="roof-side right"></div>            
            </div>
            <!--
            <div class="tree">
                <div class="tree-side-8th" style="--tree-side-i: 1"></div>
                <div class="tree-side-8th" style="--tree-side-i: 2"></div>
                <div class="tree-side-8th" style="--tree-side-i: 3"></div>
                <div class="tree-side-8th" style="--tree-side-i: 4"></div>
                <div class="tree-side-8th" style="--tree-side-i: 5"></div>
                <div class="tree-side-8th" style="--tree-side-i: 6"></div>
                <div class="tree-side-8th" style="--tree-side-i: 7"></div>
                <div class="tree-side-8th" style="--tree-side-i: 8"></div>
                <div class="trunk"></div>
            </div>
            -->
        </div>
    </div>
</body>
</html>
