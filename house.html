<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <link rel="stylesheet" href="css/pages/web/css-gallery/house.css"> -->
    <title>House: 2nd Version</title>
</head>
<body>
    <style>
    body {
        /* standard viewport width and height */
        width: 100vw;
        height: 100vh;
        /* try small viewport width and height if available */
        width: 100svw;
        height: 100svh;
        /* discard default margin and padding */
        margin: 0;
        padding: 0;
    }

    .container {
        width: 100%;
        height: 100%;
        position: relative;
        perspective: 100em;
        perspective-origin: top center;
        overflow: hidden;
        background: #001a;
    }

    .scene {
        position: relative;
        /* display: flex; */
        width: 100%;
        height: 100%;
        /* background: #7777; */
        font-size: 96px;
        transform-style: preserve-3d;
        --grass-width: 8em;
        --grass-height: 8em;
        --house-width: 1.5em;
        --house-height: 2.25em;
        --house-depth: 1em;
        --speen-time: 30s;
        --speen-timing-function: linear;
        --speen-count: infinite;
        /* perspective: inherit; */
        /* perspective-origin: top center; */
        /* top: 64px; */
        /* animation: speen var(--speen-time) var(--speen-timing-function) var(--speen-count); */
        transform: rotateY(30deg);
    }

    .scene > * {
        position: absolute;
        outline: lime 1px solid;
        /* transform: rotateY(45deg); */
    }

    @keyframes speen {
        0% {
            transform: rotateY(0deg);
        }
        100% {
            transform: rotateY(360deg);
        }
    }

    .grass {
        top: 1em;
        width: var(--grass-width);
        height: var(--grass-height);
        transform:
            translateX(calc(50vw - var(--grass-width) / 2)) translateY(calc(50vh - var(--grass-height) / 2))
            rotateX(90deg)
            ;
        background-image: repeating-conic-gradient(
            from 45deg,
            #1717 0deg 90deg,
            #1a17 9deg 180deg
        );
        background-size: 1em 1em;
    }
    .grass::before {
        content: ' ';
        position: absolute;
        width: 100%;
        height: 100%;
        background-image: radial-gradient(ellipse at center, #FFE1 37%, #0004);
        background-blend-mode: multiply;
        transform: translateX(-1px);
    }

    .house * {
        position: absolute;
    }

    .house {
        --house-container-margin: 1em;
        --house-container-width: calc(var(--house-height) + var(--house-container-margin));
        --house-container-height: calc(var(--house-height) + var(--house-container-margin));
        width: var(--house-container-width);
        height: var(--house-container-height);
        top: calc(50% - var(--house-container-height) / 2 - var(--house-container-margin));
        left: calc(50% - var(--house-container-width) / 2 - var(--house-container-margin) / 4);
        position: relative;
        transform-style: preserve-3d;
        
        .house-side {
            --color-front: #cdc;
            --color-left: #898;
            --color-right: #bcb;
            --color-back: #9a9;
            background-image: radial-gradient(ellipse at center, #fed2, #0002);
            bottom: 0;
        }
        .house-side.front, .house-side.bottom, .house-side.back {
            left: calc(var(--house-container-margin) / 2 + 1px * var(--house-width) / var(--house-height) );
            height: var(--house-height);
            width: var(--house-width);
        }
        .house-side.right, .house-side.left {
            left: calc(var(--house-width) / 2);
            height: var(--house-height);
            width: var(--house-height);
        }
        .house-side.bottom {
            opacity: 100%;
            background-color: #222;
            filter: drop-shadow(0px 0px 128px #111);
            transform: translateY(calc(var(--house-height) * 0.5 + 1px)) rotateX(90deg);
        }
        .house-side.front {
            background-color: var(--color-front);
            transform: translateZ(calc(var(--house-height) * 0.5));
            animation:
            colorShift-front var(--speen-time) var(--speen-timing-function) var(--speen-count)
            ;
            
        }
        .house-side.right {
            background-color: var(--color-right);
            transform: translateX(calc(var(--house-width) * 0.5)) rotateY(90deg);
            animation:
                colorShift-right var(--speen-time) var(--speen-timing-function) var(--speen-count)
            ;
        }
        .house-side.back {
            background-color: var(--color-back);
            transform: translateZ(calc(var(--house-height) * -0.5)) rotateY(180deg);
            animation:
                colorShift-back var(--speen-time) var(--speen-timing-function) var(--speen-count)
            ;
        }
        .house-side.left {
            background-color: var(--color-left);
            transform: translateX(calc(var(--house-width) * -0.5)) rotateY(270deg);
            animation:
                colorShift-left var(--speen-time) var(--speen-timing-function) var(--speen-count)
            ;
        }
    }

    @keyframes colorShift-front {
            0% {background-color: var(--color-front);}
            25% {background-color: var(--color-right);}
            50% {background-color: var(--color-back);}
            75% {background-color: var(--color-left);}
        }
        @keyframes colorShift-right {
            0% {background-color: var(--color-right);}
            25% {background-color: var(--color-back);}
            50% {background-color: var(--color-left);}
            75% {background-color: var(--color-front);}
        }
        @keyframes colorShift-back {
            0% {background-color: var(--color-back);}
            25% {background-color: var(--color-left);}
            50% {background-color: var(--color-front);}
            75% {background-color: var(--color-right);}
        }
        @keyframes colorShift-left {
            0% {background-color: var(--color-left);}
            25% {background-color: var(--color-front);}
            50% {background-color: var(--color-right);}
            75% {background-color: var(--color-back);}
        }

    </style>
    <div class="container">
        <div class="scene">
            <div class="grass"></div>
            <div class="house">
                <div class="house-side front"></div>
                <div class="house-side left"></div>
                <div class="house-side right"></div>
                <div class="house-side back"></div>
                <div class="house-side bottom"></div>
                <div class="roof-side left"></div>
                <div class="roof-side right"></div>            
            </div>
            <!--
            <div class="tree">
                <div class="tree-side-8th" style="--tree-side-i: 1"></div>
                <div class="tree-side-8th" style="--tree-side-i: 2"></div>
                <div class="tree-side-8th" style="--tree-side-i: 3"></div>
                <div class="tree-side-8th" style="--tree-side-i: 4"></div>
                <div class="tree-side-8th" style="--tree-side-i: 5"></div>
                <div class="tree-side-8th" style="--tree-side-i: 6"></div>
                <div class="tree-side-8th" style="--tree-side-i: 7"></div>
                <div class="tree-side-8th" style="--tree-side-i: 8"></div>
                <div class="trunk"></div>
            </div>
            -->
        </div>
    </div>
</body>
</html>
