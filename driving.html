<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driving</title>
</head>
<body>
    <style>
    :root {
        --track-dimension: 3;
    }
    body { width: 100vw; width: 100svw; height: 100vh; height: 100svh; margin: 0; padding: 0;}
    .scene-container {
        position: relative;
        width: 100%;
        height: 100%;
        perspective: 100em;
        perspective-origin: center;
        font-size: var(--perspective-font-size);
    }
    .scene {
        position: absolute;
        width: 100%;
        height: 100%;
        transform-style: preserve-3d;
    }
    .scene > * {
        position: absolute;
    }
    .grass {
        --grass-width: 8em;
        --grass-height: 8em;
        top: calc(50% - var(--grass-height) / 2);
        left: calc(50% - var(--grass-width) / 2);
        width: var(--grass-width);
        height: var(--grass-height);
        background-image: repeating-conic-gradient(
        from 45deg,
            #1717 0deg 90deg,
            #1a17 9deg 180deg
        );
        background-size: 1em 1em;
    }
    .sprite-sheet-viewer {
        z-index: 2;
        position: absolute;
        background-color: #7777;
        top: 0;
        right: 0;
        width: 24vw;
        height: 24vw;
        display: grid;
        grid-template-columns: repeat(var(--track-dimension), 1fr);
        grid-template-rows: repeat(var(--track-dimension), 1fr);
        justify-items: stretch;
        
    }
    .track-piece {
        display: grid;
        background-color: #334;
    }
    .track-piece.straight-vertical, .track-piece.straight-horizontal {
        clip-path: polygon(0% 0%, 10% 0%, 90% 0%, 90% 100%, 10% 100%, 10% 0%);
        background-image:
        repeating-linear-gradient(to bottom, #334f 0%, #334f 9.7%, #3340 9.8%, #3340 25.3%, #334f 25.4%, #334f 33.3%),
        linear-gradient(to left, #eee0 0%, #eee0 44%, #eeef 48%, #eeef 52%, #eee0 53%)
        ;
    }
    .track-piece.straight-horizontal {
        transform: rotateZ(90deg);
    }
    .track-piece.upper-left-corner {
        
    }
    </style>
    <div class="sprite-sheet-viewer">
        <div></div>
        <div class="track-piece straight-horizontal"></div>
        <div class="track-piece upper-left-corner"></div>
        <div class="track-piece straight-vertical"></div>
        <div></div>
        <div></div>
        <div class="track-piece straight-vertical"></div>
    </div>
    <div class="scene-container" style="--perspective-font-size: 96px">
        <div class="scene">
            <div class="track"></div>
            <div class="grass"></div>
        </div>
    </div>
</body>
</html>
