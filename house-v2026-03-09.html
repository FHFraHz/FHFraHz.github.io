<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <link rel="stylesheet" href="css/pages/web/css-gallery/house.css"> -->
    <title>Document</title>
</head>
<body>

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            height: 100svh;
            /*  */
        }
        /* h1, h2, h3, h4, h5, h6 { margin: 0; padding: 1ch 0ch;} */


        .house-container {
            position: relative;
            transform-style: preserve-3d;
            perspective: 15em;
            height: 100%;
            width: 100%;
        }

        .scene > * {
                transform-style: preserve-3d;
                animation: speen 60s linear infinite;
        }

        @keyframes speen {
            0% {
                transform: rotateY(0deg);
                .tree .trunk {
                    transform: rotateY(360deg);
                }
            }
            100% {
                transform: rotateY(360deg);
                .tree .trunk {
                    transform: rotateY(0deg);
                }
            }
        }

        .scene {
            position: absolute;
            perspective: 15em;
            /* perspective-origin: 50% calc(50% - 10em); */
            perspective-origin: center;
            transform-style: preserve-3d;
            background: #1117;
            width: 100%; height: 100%;
            font-size: 12px;
            overflow: hidden;
            --house-height: 10em;
            --house-width: calc(var(--house-height) * 0.75);
            /* transform: rotateY(30deg); */

            .house {
                z-index: 2;
                position: absolute;
                /* --house-height: 500px;
                --house-width: 375px; */
                height: var(--house-height);
                width: var(--house-height);
                top: calc(50% - calc(var(--house-height) / 2));
                left: calc(50% - calc(var(--house-height) / 2));
                /* transform: rotateX(10deg) rotateY(15deg); */

                * { position: absolute; }
                
                .house-side {
                    opacity: 50%;
                }
                .house-side.left, .house-side.right {
                    top: 50%;
                    height: 50%;
                    width: var(--house-height);
                }
                .house-side.front, .house-side.back {
                    top: 0%;
                    width: var(--house-width);
                    clip-path: polygon(0% 50%, 50% 0%, 100% 50%, 100% 100%, 0% 100%, 0% 50%);
                    height: 100%;
                }
                .house-side.front {
                    background-color: whitesmoke;
                    background-image: radial-gradient(ellipse at top left, #FFF0, #FB03);
                    transform: translateZ(calc(var(--house-height) / 2));
                }
                .house-side.back {
                    background: slategray;
                    transform: translateZ(calc(0px - calc(var(--house-height) / 2)));
                }
                .house-side.right {
                    background: green;
                    transform:
                        translateX(calc(var(--house-width) * 0.33))
                        rotateY(90deg)
                        ;
                }
                .house-side.left {
                    background: magenta;
                    transform:
                        translateX(calc(var(--house-width) * -0.66))
                        rotateY(270deg)
                        ;
                }
                .roof-side.left, .roof-side.right {
                    height: 80%;
                    width: 100%;
                    outline: 1px solid limegreen;
                }

                .roof-side.left {
                    background: firebrick;
                    transform:
                        translateY(-10%)
                        translateX(-37%)
                        rotateZ(37deg)
                        rotateY(90deg);
                }
                .roof-side.right {
                    background: orange;
                    transform:
                        translateY(-10%)
                        translateX(12%)
                        rotateZ(323deg)
                        rotateY(270deg);
                }

                .grass {
                    z-index: 0;
                    width: 100vw;
                    height: 100vh;
                    
                    background: #070;
                    /* top: calc(50% - calc(var(--house-height) / 2)); */
                
                    /* left: calc(50% - calc(var(--house-height) / 2)); */

                    transform:
                        translateY(calc(0vh - calc(50vh - var(--house-height))))
                        translateX(calc(0vw - calc(50vw - var(--house-height))))
                        rotateX(90deg);
                }

                .tree {
                    --tree-height: 5em;
                    --tree-width: 3em;
                    height: var(--tree-height);
                    width: var(--tree-width);
                    perspective: 10em;
                    transform-style: preserve-3d;
                    top: calc(var(--house-height) - var(--tree-height));
                    left: 0;
                    transform: translateZ(8em) translateX(-5em);
                    /* background: brown; */

                    .trunk {
                        position: absolute;
                        --trunk-width: calc(var(--tree-width) / 3);
                        --trunk-height: calc(var(--tree-height) / 3);
                        width: var(--trunk-width);
                        height: var(--trunk-height);
                        bottom: 0;
                        left: var(--trunk-height);
                        background: #521;
                        background-image: linear-gradient(to right, #FFF0, #FFF3);
                    }
                }

            }
        }
    </style>

    <div class="house-container">
        <div class="scene">
            <div class="house">
                <div class="house-side front"></div>
                <div class="house-side left"></div>
                <div class="house-side right"></div>
                <div class="house-side back"></div>
                <div class="roof-side left"></div>
                <div class="roof-side right"></div>            
                <div class="tree">
                    <div class="tree-side-8th" style="--tree-side-i: 1"></div>
                    <div class="tree-side-8th" style="--tree-side-i: 2"></div>
                    <div class="tree-side-8th" style="--tree-side-i: 3"></div>
                    <div class="tree-side-8th" style="--tree-side-i: 4"></div>
                    <div class="tree-side-8th" style="--tree-side-i: 5"></div>
                    <div class="tree-side-8th" style="--tree-side-i: 6"></div>
                    <div class="tree-side-8th" style="--tree-side-i: 7"></div>
                    <div class="tree-side-8th" style="--tree-side-i: 8"></div>
                    <div class="trunk"></div>
                </div>
                <div class="grass"></div>
            </div>
        </div>
    </div>
</body>
</html>
